root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/dependabot-alert-notice ."
bin = "./tmp/dependabot-alert-notice"
args_bin = ["-config", "config.yaml"]
include_ext = ["go"]
exclude_dir = ["tmp", "bin", "internal/web/templates"]
delay = 500
kill_delay = 500

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
