{{define "layout"}}
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dependabot Alert Notice</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Reddit+Sans:ital,wdth,wght@0,75..100,200..900;1,75..100,200..900&family=IBM+Plex+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* --- CSS 変数 --- */
    :root {
      --color-bg: #fefbfb;
      --color-text: #483030;
      --color-muted: #a39696;
      --color-border: #dfd7d7;
      --color-surface: #f2f0f0;
      --color-accent: #73862d;
      --color-danger: #c0392b;
      --font: "Reddit Sans", "IBM Plex Sans JP", BlinkMacSystemFont, sans-serif;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --transition: all 0.4s var(--ease);
      --max-w: 1100px;
      --radius: 12px;
      --radius-sm: 8px;
    }

    /* --- リセット & ベース --- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      font-size: 15px;
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { color: var(--color-accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button { cursor: pointer; font-family: var(--font); border: none; }

    /* --- ヘッダー --- */
    #site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
    }
    .header-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 1.5rem;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 1rem;
      color: var(--color-text);
      text-decoration: none;
      flex-shrink: 0;
      transition: var(--transition);
    }
    .logo:hover { opacity: 0.7; text-decoration: none; }
    .header-nav { display: flex; align-items: center; gap: 4px; }
    .nav-link {
      padding: 6px 12px;
      color: var(--color-muted);
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      text-decoration: none;
    }
    .nav-link:hover { color: var(--color-text); background: var(--color-surface); text-decoration: none; }

    /* --- コンテナ --- */
    .container { max-width: var(--max-w); margin: 0 auto; padding: 2rem 1.5rem; }

    /* --- カード --- */
    .card {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    /* --- ページタイトル --- */
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 1.25rem; }
    h2 { font-size: 1rem; font-weight: 600; }

    /* --- テーブル --- */
    .table-wrap { overflow-x: auto; border-radius: var(--radius-sm); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--color-border); }
    th {
      background: var(--color-surface);
      color: var(--color-muted);
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: var(--color-surface); }

    /* --- バッジ --- */
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .badge-critical { background: #fde8e8; color: #b91c1c; }
    .badge-high     { background: #fef3cd; color: #92400e; }
    .badge-medium   { background: #fef9c3; color: #713f12; }
    .badge-low      { background: #dcfce7; color: #166534; }
    .badge-pending  { background: #f2f0f0; color: #a39696; }
    .badge-approved { background: #dcfce7; color: #166534; }
    .badge-rejected { background: #fde8e8; color: #b91c1c; }
    .badge-merged   { background: #ede9fe; color: #6d28d9; }
    .badge-info     { background: #dbeafe; color: #1e40af; }
    .badge-error    { background: #fde8e8; color: #b91c1c; }
    .badge-warn     { background: #fef3cd; color: #92400e; }

    /* --- ボタン --- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 7px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 600;
      transition: var(--transition);
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: var(--color-text);
      color: var(--color-bg);
    }
    .btn-primary:hover { opacity: 0.82; text-decoration: none; color: var(--color-bg); }
    .btn-approve {
      background: #166534;
      color: #fff;
    }
    .btn-approve:hover { background: #15803d; }
    .btn-reject {
      background: var(--color-danger);
      color: #fff;
    }
    .btn-reject:hover { background: #e53e3e; }
    .btn-ghost {
      background: transparent;
      color: var(--color-muted);
      border: 1px solid var(--color-border);
    }
    .btn-ghost:hover { color: var(--color-text); background: var(--color-surface); text-decoration: none; }

    /* --- フォーム --- */
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 0.8rem; font-weight: 600; color: var(--color-muted); }
    input[type=text], input[type=password], select, textarea {
      padding: 8px 12px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 0.9rem;
      color: var(--color-text);
      outline: none;
      transition: border-color 0.2s;
    }
    input[type=text]:focus, input[type=password]:focus, select:focus, textarea:focus {
      border-color: var(--color-accent);
    }

    /* --- アラート/メッセージ --- */
    .msg {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .msg-error { background: #fde8e8; border: 1px solid #fca5a5; color: #b91c1c; }
    .msg-success { background: #dcfce7; border: 1px solid #86efac; color: #166534; }

    /* --- ログエントリ --- */
    .log-entry {
      padding: 8px 14px;
      border-bottom: 1px solid var(--color-border);
      font-size: 0.8rem;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-ts { color: var(--color-muted); white-space: nowrap; font-variant-numeric: tabular-nums; }
    .log-msg { flex: 1; }
    @keyframes log-flash { from { background: color-mix(in srgb, var(--color-accent) 15%, transparent); } to { background: transparent; } }
    .log-entry-new { animation: log-flash 0.6s ease-out; }

    /* --- インタラクション --- */
    .interactive-scale { transition: var(--transition); }
    .interactive-scale:hover { transform: scale(1.02); }
    .interactive-scale:active { transform: scale(0.97); }

    /* --- ダッシュボードヘッダー --- */
    .dashboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .dashboard-header h1 { margin-bottom: 0; }
    .dashboard-actions { display: flex; align-items: center; gap: 8px; }
    .polling-badge { font-size: 0.85rem; padding: 5px 12px; }

    /* --- CVEグループ (アコーディオン) --- */
    .cve-list { display: flex; flex-direction: column; gap: 8px; }

    .cve-group {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .cve-summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .cve-summary::-webkit-details-marker { display: none; }
    .cve-summary::marker { display: none; }
    .cve-summary:hover { background: var(--color-surface); }
    .cve-group[open] > .cve-summary { border-bottom: 1px solid var(--color-border); }

    .cve-summary-main {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .cve-pkg { font-weight: 600; white-space: nowrap; }
    .branch-badge { font-size: 0.78rem; color: var(--color-muted); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 4px; padding: 1px 6px; }
    .contributors-cell { font-size: 0.78rem; color: var(--color-muted); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .text-muted-small { font-size: 0.78rem; color: var(--color-muted); }
    .contributors-row-repo { font-size: 0.82rem; color: var(--color-muted); padding: 6px 8px 2px; }
    .contributors-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .contributor-badge { font-size: 0.78rem; }
    .cve-id {
      font-size: 0.82rem;
      color: var(--color-muted);
      font-family: monospace;
      white-space: nowrap;
    }
    .cve-desc {
      font-size: 0.85rem;
      color: var(--color-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cve-summary-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    /* --- CVEグループ内テーブル --- */
    .cve-repos-wrap { overflow-x: auto; }
    .cve-repos { width: 100%; border-collapse: collapse; }
    .cve-repos th, .cve-repos td {
      padding: 9px 14px;
      text-align: left;
      border-bottom: 1px solid var(--color-border);
    }
    .cve-repos th {
      background: var(--color-surface);
      color: var(--color-muted);
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    /* CVE別ビュー: col1=リポジトリ(flex), col2=AI評価(160px), col3=ステータス(100px), col4=操作(140px) */
    .cve-repos th:nth-child(2), .cve-repos td:nth-child(2) { width: 160px; white-space: nowrap; }
    .cve-repos th:nth-child(3), .cve-repos td:nth-child(3) { width: 100px; white-space: nowrap; }
    .cve-repos th:nth-child(4), .cve-repos td:nth-child(4) { width: 140px; white-space: nowrap; }
    /* リポジトリ別ビュー: col1=パッケージ(flex), col2=CVE(120px), col3=AI評価(160px), col4=ステータス(100px), col5=操作(140px) */
    .cve-repos-repo th:nth-child(2), .cve-repos-repo td:nth-child(2) { width: 120px; white-space: nowrap; }
    .cve-repos-repo th:nth-child(3), .cve-repos-repo td:nth-child(3) { width: 160px; white-space: nowrap; }
    .cve-repos-repo th:nth-child(4), .cve-repos-repo td:nth-child(4) { width: 100px; white-space: nowrap; }
    .cve-repos-repo th:nth-child(5), .cve-repos-repo td:nth-child(5) { width: 140px; white-space: nowrap; }
    .cve-repos tr:last-child td { border-bottom: none; }
    .cve-repos tbody tr { transition: background 0.15s; }
    .cve-repos tbody tr:hover { background: var(--color-surface); }
    .repo-link { font-size: 0.88rem; }
    .gh-link { font-size: 0.8rem; color: var(--color-muted); margin-left: 4px; opacity: 0.7; text-decoration: none; }
    .gh-link:hover { opacity: 1; color: var(--color-accent); }
    .action-cell { white-space: nowrap; }
    .action-cell form + form { margin-left: 4px; }

    /* --- ボタン小サイズ・無効 --- */
    .btn-sm { padding: 4px 12px; font-size: 0.8rem; }
    .btn-disabled { opacity: 0.45; cursor: default; pointer-events: none; }

    /* --- 空状態 --- */
    .empty-card { text-align: center; }
    .empty-msg { color: var(--color-muted); padding: 1.5rem 0; }

    /* --- ページネーション --- */
    .pagination { display: flex; align-items: center; gap: 8px; justify-content: center; margin-top: 1.2rem; flex-wrap: wrap; }
    .pagination-info { color: var(--color-muted); font-size: 0.85rem; }

    /* --- ビュータブ --- */
    .view-tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--color-border); }
    .view-tab { padding: 6px 16px; font-size: 0.88rem; color: var(--color-muted); text-decoration: none; border-radius: 6px 6px 0 0; border: 1px solid transparent; border-bottom: none; transition: background 0.15s, color 0.15s; }
    .view-tab:hover { color: var(--color-text); background: var(--color-surface); }
    .view-tab-active { color: var(--color-text); background: var(--color-surface); border-color: var(--color-border); font-weight: 600; }

    /* --- テキストユーティリティ --- */
    .text-muted { color: var(--color-muted); }
    .field-hint { color: var(--color-muted); font-size: 0.82rem; }
    .field-hint-block { color: var(--color-muted); font-size: 0.8rem; margin-top: 4px; }
    .input-row { display: flex; align-items: center; gap: 8px; }
    .inline-form { display: inline; }

    /* --- 詳細ページ --- */
    .detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
    .detail-header h1 { margin: 0; }
    .detail-th { width: 160px; }
    .detail-actions { display: flex; gap: 10px; margin-top: 4px; }
    .pre-wrap { white-space: pre-wrap; word-break: break-word; }
    .description-body { font-size: 0.9rem; line-height: 1.6; padding: 8px 0; }
    .markdown-body { font-size: 0.9rem; line-height: 1.7; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin: 1em 0 0.4em; font-weight: 600; }
    .markdown-body h1 { font-size: 1.25em; border-bottom: 1px solid var(--color-border); padding-bottom: 0.25em; }
    .markdown-body h2 { font-size: 1.1em; border-bottom: 1px solid var(--color-border); padding-bottom: 0.2em; }
    .markdown-body h3 { font-size: 1em; }
    .markdown-body p { margin: 0.6em 0; }
    .markdown-body ul, .markdown-body ol { padding-left: 1.6em; margin: 0.5em 0; }
    .markdown-body li { margin: 0.2em 0; }
    .markdown-body code { background: var(--color-surface); padding: 0.15em 0.35em; border-radius: 4px; font-size: 0.88em; font-family: 'IBM Plex Mono', monospace; }
    .markdown-body pre { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 6px; padding: 12px 16px; overflow-x: auto; margin: 0.75em 0; }
    .markdown-body pre code { background: none; padding: 0; font-size: 0.85em; }
    .markdown-body a { color: var(--color-accent); text-decoration: underline; word-break: break-all; }
    .markdown-body blockquote { border-left: 3px solid var(--color-border); padding-left: 1em; color: var(--color-muted); margin: 0.5em 0; }
    .markdown-body table { border-collapse: collapse; width: 100%; margin: 0.75em 0; }
    .markdown-body th, .markdown-body td { border: 1px solid var(--color-border); padding: 6px 10px; text-align: left; }
    .cvss-vector { font-size: 0.82rem; word-break: break-all; }
    .eval-waiting-msg { margin-left: 8px; font-size: 0.88rem; }
    .ref-list { list-style: none; padding: 0; margin: 0; }
    .ref-list li { padding: 4px 0; }
    .ref-list a { font-size: 0.88rem; word-break: break-all; }
    .card-warning { border-left: 3px solid var(--color-danger); }
    .card h2 { margin-bottom: 14px; }

    /* --- トースト --- */
    #toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 9999;
      pointer-events: none;
      max-width: 380px;
    }
    .toast {
      background: var(--color-text);
      color: var(--color-bg);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      animation: toast-in 0.25s var(--ease);
    }
    .toast-msg { flex: 1; }
    .toast-btn {
      background: rgba(255,255,255,0.18);
      color: inherit;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .toast-btn:hover { background: rgba(255,255,255,0.32); }
    .toast-error { background: var(--color-danger); }
    .toast-out { animation: toast-out 0.25s var(--ease) forwards; }
    @keyframes toast-in {
      from { transform: translateY(10px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes toast-out {
      from { transform: translateY(0);    opacity: 1; }
      to   { transform: translateY(10px); opacity: 0; }
    }
  </style>
</head>
<body>
  <header id="site-header">
    <div class="header-inner">
      <a href="/" class="logo">
        <span>🤖</span>
        <span>Dependabot Notice</span>
      </a>
      <nav class="header-nav">
        <a href="/" class="nav-link">📊 ダッシュボード</a>
        <a href="/logs" class="nav-link">📋 ログ</a>
        <a href="/settings" class="nav-link">⚙️ 設定</a>
      </nav>
    </div>
  </header>
  <main class="container">
    {{template "content" .}}
  </main>
  <div id="toast-container"></div>
  <script data-cfasync="false">
  (function() {
    var container = document.getElementById('toast-container');

    function showToast(msg, opts) {
      opts = opts || {};
      var t = document.createElement('div');
      t.className = 'toast' + (opts.err ? ' toast-error' : '');
      var span = document.createElement('span');
      span.className = 'toast-msg';
      span.textContent = msg;
      t.appendChild(span);
      if (opts.reload) {
        var btn = document.createElement('button');
        btn.className = 'toast-btn btn';
        btn.textContent = '更新';
        btn.onclick = function() { location.reload(); };
        t.appendChild(btn);
      }
      container.appendChild(t);
      var dur = opts.err ? 10000 : (opts.reload ? 12000 : 5000);
      setTimeout(function() { dismiss(t); }, dur);
    }

    function dismiss(t) {
      t.classList.add('toast-out');
      setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 260);
    }

    window.__showToast = showToast;

    var ready = false;
    var es = new EventSource('/api/logs-stream');
    es.addEventListener('ready', function() { ready = true; });
    es.onmessage = function(e) {
      if (!ready) return;
      var log = JSON.parse(e.data);
      showToast(log.message, { err: log.level === 'error', reload: true });
    };
  })();
  </script>
</body>
</html>
{{end}}
