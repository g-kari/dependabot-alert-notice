{{define "layout"}}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dependabot Alert Notice</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0d1117; color: #c9d1d9; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 20px; margin-bottom: 20px; }
        nav a { color: #58a6ff; text-decoration: none; margin-right: 20px; }
        nav a:hover { text-decoration: underline; }
        h1 { font-size: 1.5em; margin-bottom: 16px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75em; font-weight: 600; }
        .badge-critical { background: #da3633; color: #fff; }
        .badge-high { background: #d29922; color: #fff; }
        .badge-medium { background: #e3b341; color: #000; }
        .badge-low { background: #3fb950; color: #fff; }
        .badge-pending { background: #6e7681; color: #fff; }
        .badge-approved { background: #238636; color: #fff; }
        .badge-rejected { background: #da3633; color: #fff; }
        .badge-merged { background: #8957e5; color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #21262d; }
        th { background: #161b22; color: #8b949e; font-weight: 600; }
        tr:hover { background: #161b22; }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .btn { display: inline-block; padding: 6px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.875em; font-weight: 600; text-decoration: none; }
        .btn-approve { background: #238636; color: #fff; }
        .btn-reject { background: #da3633; color: #fff; }
        .btn-approve:hover { background: #2ea043; }
        .btn-reject:hover { background: #f85149; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
        .log-entry { padding: 8px 12px; border-bottom: 1px solid #21262d; font-family: monospace; font-size: 0.875em; }
        .log-info { color: #58a6ff; }
        .log-error { color: #f85149; }
        .log-warn { color: #d29922; }
    </style>
</head>
<body>
    <nav>
        <a href="/">📊 ダッシュボード</a>
        <a href="/logs">📋 ログ</a>
        <a href="/settings">⚙️ 設定</a>
    </nav>
    <div class="container">
        {{template "content" .}}
    </div>
</body>
</html>
{{end}}
