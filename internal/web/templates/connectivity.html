{{define "content"}}
<h1>🔌 疎通テスト</h1>

<div class="card" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
  <p style="color:var(--color-muted);font-size:0.9rem;flex:1">gh CLI・Claude CLI・Slack API・監視ターゲットへの接続を確認します。</p>
  <div style="display:flex;align-items:center;gap:10px">
    <button id="runBtn" class="btn btn-approve interactive-scale" onclick="runTests()">▶ テスト実行</button>
    <span id="spinner" style="display:none;color:var(--color-muted);font-size:0.88rem">実行中...</span>
  </div>
</div>

<div id="results" style="margin-top:1rem"></div>

<script>
const TOOLS = [
  { type: 'gh',     label: '🐙 gh CLI' },
  { type: 'claude', label: '🤖 Claude CLI' },
  { type: 'slack',  label: '💬 Slack API' },
];

function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function badge(ok, pending) {
  if (pending) return '<span style="color:var(--color-muted);font-size:0.82rem">⏳ 確認中...</span>';
  return ok
    ? '<span class="badge badge-approved">✅ OK</span>'
    : '<span class="badge badge-rejected">❌ NG</span>';
}

function initUI() {
  const results = document.getElementById('results');
  results.innerHTML = `
    <div class="card" style="padding:0;overflow:hidden;margin-bottom:1rem">
      <div style="padding:1rem 1.5rem;border-bottom:1px solid var(--color-border)">
        <h2>ツール</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ツール</th><th>状態</th><th>メッセージ</th></tr></thead>
          <tbody>
            ${TOOLS.map(t => `
              <tr id="row-${t.type}">
                <th style="width:160px;font-weight:600;color:var(--color-text);font-size:0.875rem;text-transform:none;letter-spacing:0">${t.label}</th>
                <td style="width:100px">${badge(false, true)}</td>
                <td style="color:var(--color-muted);white-space:pre-wrap;font-size:0.82rem"></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:1rem 1.5rem;border-bottom:1px solid var(--color-border)">
        <h2>📌 監視ターゲット</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Owner</th><th>Repo</th><th>状態</th><th style="text-align:right">アラート数</th><th>メッセージ</th></tr></thead>
          <tbody id="targets-body">
            <tr id="targets-placeholder"><td colspan="5" style="text-align:center;color:var(--color-muted);padding:1.5rem">確認中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>`;
}

function updateTool(ev) {
  const row = document.getElementById('row-' + ev.type);
  if (!row) return;
  const cells = row.querySelectorAll('td');
  cells[0].innerHTML = badge(ev.ok, false);
  cells[1].textContent = ev.message;
}

function addTarget(ev) {
  const tbody = document.getElementById('targets-body');
  const placeholder = document.getElementById('targets-placeholder');
  if (placeholder) placeholder.remove();

  const repo = ev.repo || '（org全体）';
  const count = ev.ok ? (ev.count ?? 0) : '-';
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td style="font-weight:500">${escHtml(ev.owner)}</td>
    <td style="color:var(--color-muted);font-size:0.85rem">${escHtml(repo)}</td>
    <td>${badge(ev.ok, false)}</td>
    <td style="text-align:right;font-variant-numeric:tabular-nums">${count}</td>
    <td style="color:var(--color-muted);font-size:0.82rem">${escHtml(ev.message)}</td>`;
  tbody.appendChild(tr);
}

function runTests() {
  const btn = document.getElementById('runBtn');
  const spinner = document.getElementById('spinner');
  btn.disabled = true;
  spinner.style.display = 'inline';

  initUI();

  const source = new EventSource('/api/connectivity-stream');
  source.onmessage = (e) => {
    const ev = JSON.parse(e.data);
    if (ev.type === 'done') {
      source.close();
      btn.disabled = false;
      spinner.style.display = 'none';
      return;
    }
    if (ev.type === 'target') {
      addTarget(ev);
    } else {
      updateTool(ev);
    }
  };
  source.onerror = () => {
    source.close();
    btn.disabled = false;
    spinner.style.display = 'none';
  };
}
</script>
{{end}}
