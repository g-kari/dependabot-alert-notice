repos:
  - repo: local
    hooks:
      - id: go-fmt
        name: gofmt
        language: system
        entry: bash -c 'eval "$(devbox shellenv --recompute 2>/dev/null)" && unformatted=$(gofmt -l .); [ -z "$unformatted" ] || (echo "gofmt が必要なファイル:"; echo "$unformatted"; exit 1)'
        pass_filenames: false
        types: [go]

      - id: go-vet
        name: go vet
        language: system
        entry: bash -c 'eval "$(devbox shellenv --recompute 2>/dev/null)" && go vet ./...'
        pass_filenames: false
        types: [go]

      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: bash -c 'eval "$(devbox shellenv --recompute 2>/dev/null)" && golangci-lint run ./...'
        pass_filenames: false
        types: [go]

      - id: go-test
        name: go test
        language: system
        entry: bash -c 'eval "$(devbox shellenv --recompute 2>/dev/null)" && go test ./... -count=1 -race'
        pass_filenames: false
        types: [go]
